version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "uuid"
            nullable: true
            go_type: "string"
