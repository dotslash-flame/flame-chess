<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlameChess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161513; --bg2:#211f1c; --panel:#262420; --panel2:#302d28;
    --txt:#ece8e1; --muted:#9d968a; --line:#ffffff14;
    --accent:#ff7a2f; --accent2:#ffb056; --ok:#86d98f; --bad:#ff8a8a; --warn:#e8c35b;
    --light:#e9edcf; --dark:#6d8c4a; --sel:#fbe06b4d; --lastmv:#ff7a2f40; --check:#ff4d4dcc;
    --radius:14px; --shadow:0 10px 30px #000a; --glow:0 0 24px #ff7a2f33;
  }
  *{box-sizing:border-box;}
  body{margin:0;font:14px/1.5 'Inter',system-ui,sans-serif;color:var(--txt);min-height:100vh;
       background:radial-gradient(1100px 560px at 50% -12%,#332d27,transparent 62%),var(--bg);background-attachment:fixed;}
  .hidden{display:none!important;}
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 18px;position:sticky;top:0;z-index:40;
          background:#141312cc;backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .brand{font-weight:800;font-size:17px;letter-spacing:.3px;
         background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .navlink{color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:8px;transition:background .15s,color .15s;display:inline-flex;align-items:center;gap:6px;}
  .navlink:hover,.navlink.active{color:var(--txt);background:#ffffff12;}
  .spacer{margin-left:auto;}
  .pill{padding:3px 11px;border-radius:20px;background:#0005;border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:500;}
  .pill.ok{color:var(--ok);} .pill.warn{color:var(--warn);} .pill.bad{color:var(--bad);}
  .chatlist{flex:1;overflow:auto;display:flex;flex-direction:column;gap:6px;margin:8px 0 0;padding-right:2px;}
  .chatrow{display:flex;flex-direction:column;max-width:88%;align-self:flex-start;}
  .chatrow.mine{align-self:flex-end;align-items:flex-end;}
  .chatfrom{font-size:10px;color:var(--muted);margin:0 0 1px 2px;}
  .chatbubble{background:#0005;border:1px solid var(--line);border-radius:12px;padding:5px 10px;font-size:13px;line-height:1.35;word-break:break-word;}
  .chatrow.mine .chatbubble{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1411;border:none;font-weight:600;}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius);padding:14px;
         box-shadow:0 1px 0 #ffffff0a inset,0 8px 24px #0006;}
  .btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:9px 16px;cursor:pointer;font:inherit;font-weight:600;transition:transform .12s ease,background .15s,box-shadow .15s;}
  .btn:hover:not(:disabled){background:#3c3833;transform:translateY(-1px);}
  .btn:active:not(:disabled){transform:translateY(0);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1411;font-weight:800;border:none;box-shadow:0 6px 18px #ff7a2f55,var(--glow);}
  .btn.primary:hover:not(:disabled){box-shadow:0 10px 26px #ff7a2f77,var(--glow);}
  .btn.ghost{background:transparent;}
  input{background:#1a1816;color:var(--txt);border:1px solid #4a463f;border-radius:8px;padding:8px 10px;font:inherit;transition:border-color .15s,box-shadow .15s;}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px #ff7a2f33;}
  input.short{width:70px;}
  .view{padding:22px 18px;max-width:1080px;margin:0 auto;}
  .muted{color:var(--muted);} .me{color:var(--accent);font-weight:700;}
  .avatar{width:26px;height:26px;border-radius:50%;flex:none;overflow:hidden;position:relative;
          background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 0 2px #0003;
          display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;}
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .avatar i{font-style:normal;font-weight:800;font-size:12px;color:#1a1411;}
  .avatar.lg{width:44px;height:44px;} .avatar.lg i{font-size:18px;}

  .boardWrap{position:relative;width:min(76vw,560px);aspect-ratio:1;}
  #board{width:100%;height:100%;display:grid;grid-template-columns:repeat(8,1fr);
         grid-template-rows:repeat(8,1fr);border-radius:10px;overflow:hidden;
         box-shadow:var(--shadow),0 0 0 1px #00000055,0 0 0 6px #1c1a17,0 0 0 7px #ffffff0d;}
  .sq{position:relative;display:flex;align-items:center;justify-content:center;
      line-height:1;cursor:pointer;user-select:none;touch-action:none;}
  .sq.l{background:var(--light);} .sq.d{background:var(--dark);}
  .sq.sel::before{content:"";position:absolute;inset:0;background:var(--sel);}
  .sq.last::before{content:"";position:absolute;inset:0;background:var(--lastmv);}
  .sq.premove::before{content:"";position:absolute;inset:0;background:#3aa0e055;box-shadow:inset 0 0 0 3px #3aa0e0aa;}
  .sq.check::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,var(--check) 0,var(--check) 18%,transparent 72%);}
  .sq .piece{position:relative;z-index:1;width:90%;height:90%;display:block;pointer-events:none;
             filter:drop-shadow(0 2px 2.5px #00000040);transition:transform .18s cubic-bezier(.22,.61,.36,1);}
  .sq .dot{position:absolute;z-index:2;width:30%;height:30%;border-radius:50%;background:#15120f4d;pointer-events:none;}
  .sq.l .dot{background:#5a4a2e40;}
  .sq .dot.cap{width:92%;height:92%;background:none;border:5px solid #15120f40;box-sizing:border-box;}
  .sq.l .dot.cap{border-color:#5a4a2e45;}
  .sq:hover .dot{background:var(--accent);opacity:.5;}
  .sq:hover .dot.cap{border-color:var(--accent);background:none;opacity:.55;}
  /* edge coordinates (chess.com style): rank numbers on the left column, file letters on the bottom row */
  .sq .rkco{position:absolute;z-index:2;top:2px;left:3px;font:700 9px 'JetBrains Mono',ui-monospace,monospace;pointer-events:none;}
  .sq .flco{position:absolute;z-index:2;bottom:1px;right:3px;font:700 9px 'JetBrains Mono',ui-monospace,monospace;pointer-events:none;}
  .sq.l .rkco,.sq.l .flco{color:#5a6f3ec0;} .sq.d .rkco,.sq.d .flco{color:#e7ecd0cc;}
  .sq.drag{cursor:grabbing;}
  @media(prefers-reduced-motion:reduce){ .sq .piece{transition:none!important;} }

  .ovl{position:fixed;inset:0;background:#000a;backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;}
  .clock{font:700 19px 'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;letter-spacing:.5px;
         background:#1a1816;border:1px solid var(--line);border-radius:8px;padding:5px 12px;min-width:86px;text-align:center;color:var(--txt);
         transition:background .15s,color .15s,box-shadow .15s;}
  .clock.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1411;border-color:transparent;box-shadow:0 4px 14px #ff7a2f55;}
  .clock.low{color:var(--bad);} .clock.active.low{color:#3a0f0f;background:linear-gradient(135deg,#ff8a8a,#ffb056);}

  .pcard{display:flex;align-items:center;gap:10px;padding:8px 12px;}
  .pcard-main{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .pcard-name{display:flex;align-items:center;gap:8px;line-height:1.2;}
  .ratechip{font:700 11px 'JetBrains Mono',ui-monospace,monospace;color:var(--txt);background:#0004;border:1px solid var(--line);
            border-radius:6px;padding:1px 6px;display:inline-flex;align-items:center;gap:5px;}
  .ratechip .ratecat{color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:9px;}
  .cap-tray{display:flex;align-items:center;height:18px;}
  .cap-tray .piece{width:17px;height:17px;filter:none;margin-right:-4px;opacity:.92;}
  .matadv{font:700 12px 'JetBrains Mono',ui-monospace,monospace;color:var(--ok);margin-left:8px;}

  .tcgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0;}
  .tccard{display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:10px 12px;cursor:pointer;
          background:var(--panel2);border:1px solid var(--line);border-radius:12px;color:var(--txt);font:inherit;text-align:left;
          transition:transform .12s ease,border-color .15s,box-shadow .15s;}
  .tccard:hover{transform:translateY(-2px);border-color:#ff7a2f55;box-shadow:0 8px 20px #0005;}
  .tccard.sel{border-color:transparent;background:linear-gradient(135deg,#3a2a1e,#2c2722);box-shadow:inset 0 0 0 2px var(--accent),var(--glow);}
  .tc-cat{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .tccard.sel .tc-cat{color:var(--accent2);}
  .tc-time{font:800 18px 'JetBrains Mono',ui-monospace,monospace;}
  .tc-rate{font:600 11px 'JetBrains Mono',ui-monospace,monospace;color:var(--muted);}

  .mvrow{display:grid;grid-template-columns:26px 1fr 1fr;gap:4px;align-items:center;padding:1px 0;}
  .mvrow .mvno{color:var(--muted);}
  .mvrow .mv{padding:0 5px;border-radius:5px;}
  .mvrow .mv.cur{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1411;font-weight:700;}

  .result{position:relative;overflow:hidden;animation:pop .22s cubic-bezier(.22,.61,.36,1);}
  .result::before{content:"";position:absolute;left:0;right:0;top:0;height:4px;}
  .result.win::before{background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .result.loss::before{background:var(--bad);} .result.draw::before{background:var(--warn);}
  .result-glyph{width:64px;height:64px;margin:6px auto 0;border-radius:50%;display:flex;align-items:center;justify-content:center;
                background:#0004;border:1px solid var(--line);}
  .result-glyph svg{width:46px;height:46px;filter:drop-shadow(0 2px 3px #0006);}
  .result.win .result-glyph{box-shadow:0 0 22px #ff7a2f55;border-color:#ff7a2f55;}
  .result .pill{animation:pop .3s .12s both;}
  @keyframes pop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
  @media(prefers-reduced-motion:reduce){.result,.result .pill{animation:none;}}

  td,th{padding:4px 8px;border-bottom:1px solid var(--line);}
  @media(max-width:760px){
    #view-lobby>div{grid-template-columns:1fr!important;}
    #view-game>div{grid-template-columns:1fr!important;justify-content:stretch!important;}
    .boardWrap{width:92vw;}
    .topbar{flex-wrap:wrap;gap:8px;}
  }
  /* ===== Dotslash matrix loader ===== */
  #dlLoader{position:fixed;inset:0;z-index:9999;--dlpink:#ff2d6f;--dlpink2:#ff79a9;--dlmtx:#19ff8a;}
  #dlLoader .dl-door{position:absolute;top:0;height:100%;width:50%;overflow:hidden;background:#050608;
    transition:transform .9s cubic-bezier(.76,0,.18,1);will-change:transform;}
  #dlLoader .dl-left{left:0;} #dlLoader .dl-right{right:0;}
  #dlLoader .dl-door canvas{position:absolute;top:0;height:100%;width:100vw;opacity:.5;z-index:1;}
  #dlLoader .dl-left canvas{right:0;} #dlLoader .dl-right canvas{left:0;}
  #dlLoader .dl-door::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(120% 80% at 50% 40%,#1a0410aa 0%,#05050899 60%,#050505 100%);}
  #dlLoader .dl-door::before{content:"";position:absolute;top:0;bottom:0;width:1px;z-index:4;
    background:linear-gradient(#19ff8a00,#19ff8a,#19ff8a00);opacity:0;transition:opacity .25s;}
  #dlLoader .dl-left::before{right:0;} #dlLoader .dl-right::before{left:0;}
  #dlLoader .dl-inner{position:absolute;top:0;height:100%;width:100vw;z-index:3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;}
  #dlLoader .dl-left .dl-inner{left:0;} #dlLoader .dl-right .dl-inner{left:-50vw;}
  #dlLoader .dl-heartwrap{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;
    isolation:isolate;animation:dlbeat 1.5s ease-in-out infinite;will-change:transform;}
  #dlLoader .dl-heart{width:100%;height:100%;filter:drop-shadow(0 10px 30px rgba(255,45,111,.5));animation:dlglow 1.5s ease-in-out infinite;}
  #dlLoader .dl-logo{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);width:58px;height:auto;
    filter:invert(1);mix-blend-mode:screen;}
  #dlLoader .dl-cap{display:flex;flex-direction:column;align-items:center;gap:9px;}
  #dlLoader .dl-lead{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#9affc9;opacity:.7;padding-left:5px;white-space:nowrap;}
  #dlLoader .dl-brand{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:32px;color:#fff;white-space:nowrap;}
  #dlLoader .dl-ac{color:var(--dlpink2);}
  #dlLoader .dl-cur{display:inline-block;width:10px;height:24px;margin-left:5px;background:var(--dlmtx);
    transform:translateY(3px);animation:dlblink 1s steps(1) infinite;box-shadow:0 0 10px var(--dlmtx);}
  #dlLoader .dl-seam{position:absolute;top:0;bottom:0;left:50%;width:3px;transform:translateX(-50%);z-index:7;
    background:linear-gradient(180deg,transparent,var(--dlmtx),#fff,var(--dlmtx),transparent);
    opacity:0;box-shadow:0 0 22px var(--dlmtx);}
  #dlLoader.dl-preopen .dl-seam{opacity:1;animation:dlcut .45s ease;}
  #dlLoader.dl-preopen .dl-door::before{opacity:1;}
  #dlLoader.dl-open .dl-seam{opacity:0;}
  #dlLoader.dl-open .dl-left{transform:translateX(-100%);}
  #dlLoader.dl-open .dl-right{transform:translateX(100%);}
  #dlLoader.dl-gone{display:none;}
  @keyframes dlcut{0%{transform:translateX(-50%) scaleY(0);}100%{transform:translateX(-50%) scaleY(1);}}
  @keyframes dlbeat{0%,100%{transform:scale(1);}14%{transform:scale(1.16);}28%{transform:scale(1);}42%{transform:scale(1.10);}56%{transform:scale(1);}}
  @keyframes dlglow{0%,100%{filter:drop-shadow(0 10px 28px rgba(255,45,111,.45));}14%{filter:drop-shadow(0 14px 46px rgba(255,45,111,.85));}}
  @keyframes dlblink{0%,50%{opacity:1;}51%,100%{opacity:0;}}
  @media(prefers-reduced-motion:reduce){#dlLoader .dl-heartwrap,#dlLoader .dl-heart,#dlLoader .dl-cur{animation:none!important;}}
</style>
</head>

  const sx=ev.clientX, sy=ev.clientY; let moved=false, dragEl=null;
  // pickup: select the piece and grab its element so it can follow the pointer
  if(mine){ sel=sq; renderBoard();
    const cell=vq('#board').querySelector('[data-sq="'+sq+'"]'); dragEl=cell&&cell.querySelector('.piece');
    if(dragEl) dragEl.style.willChange='transform'; }
  const move=e=>{ const dx=e.clientX-sx, dy=e.clientY-sy;
    if(!moved && (Math.abs(dx)>4||Math.abs(dy)>4)){ moved=true; const bd=vq('#board'); if(bd) bd.style.overflow='visible'; } // un-clip while dragging
    if(moved && dragEl){ dragEl.style.transition='none'; dragEl.style.zIndex='6'; dragEl.style.transform='translate('+dx+'px,'+dy+'px)'; } };
  const up=e=>{
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
    const t=document.elementFromPoint(e.clientX,e.clientY);
    const cell=t&&t.closest&&t.closest('.sq');
    const to=cell&&cell.dataset?cell.dataset.sq:null;
    if(moved){ // drag release
      if(sel && to && to!==sel){
        const from=sel;
        if(myTurn){
          if(!isLegalMove(from,to)){ resetDrag(dragEl); sel=null; renderBoard(); return; }
          const pc=fenToBoard(state.game.fen)[from];
          const promo=(pc==='P'&&to[1]==='8')||(pc==='p'&&to[1]==='1');
          if(promo){ resetDrag(dragEl); sel=null; renderBoard(); tryMove(from,to); }
          else { slideDragTo(dragEl,from,to); optimisticMove=from+to; sel=null; doMove(from+to);
                 setTimeout(()=>{ if(optimisticMove===from+to){ optimisticMove=null; renderBoard(); } },800); }
        } else { sel=null; renderBoard(); setPremove(from,to); }
      } else { resetDrag(dragEl); if(!mine) sel=null; renderBoard(); }
      return;
    }
    if(mine){ if(sq===prevSel){ sel=null; renderBoard(); } return; } // tap own piece -> toggle select
    if(prevSel){ sel=null; renderBoard(); commit(prevSel,sq); return; } // tap a destination
    if(!myTurn && state.premove.length) clearPremove(); // tapped empty with nothing selected -> cancel chain
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
}

// ===== websocket =====
let reconnectAttempt=0, reconnectTimer=null;
function connectWS(){
  state.deliberateClose=false;
  if(state.ws){try{ state.ws.onclose=null; state.ws.close(); }catch(_){}}
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(proto+'://'+location.host+'/ws'); state.ws=ws;
  ws.onopen=()=>{
    reconnectAttempt=0; state.reconnecting=false; hideReconnectBanner();
    const jb=$('#joinBtn'); if(jb)jb.disabled=false;
    // One-shot post-open actions, all idempotent (token cleared after use).
    if(state.linkToken){ wsSend({type:'challenge.accept',token:state.linkToken}); state.linkToken=null; }
    if(state.watchToken){ wsSend({type:'spectate.join',game_id:state.watchToken}); state.watchToken=null; state.spectating=true; }
    // If we were spectating when the socket dropped, re-join the same game (server
    // re-attaches players automatically but not spectators).
    else if(state.spectating && state.game.id){ wsSend({type:'spectate.join',game_id:state.game.id}); }
  };
  ws.onclose=()=>{ if(!state.me||state.deliberateClose) return; scheduleReconnect(); };
  ws.onerror=()=>{};
  ws.onmessage=ev=>handleWS(JSON.parse(ev.data));
}
// Capped exponential backoff with jitter: 0.5s → 1s → 2s → 5s (cap 5s).
function scheduleReconnect(){
  state.reconnecting=true; showReconnectBanner();
  const steps=[500,1000,2000,5000];
  const base=steps[Math.min(reconnectAttempt,steps.length-1)];
  reconnectAttempt++;
  const wait=base+Math.floor(base*0.3*Math.random());
  clearTimeout(reconnectTimer);
  reconnectTimer=setTimeout(()=>{ if(state.me&&!state.deliberateClose) connectWS(); }, wait);
}
function wsSend(o){ logEvent('out',o); if(state.ws&&state.ws.readyState===1) state.ws.send(JSON.stringify(o)); }
function handleWS(m){
  logEvent('in',m);
  switch(m.type){
    case 'online.count': state.online=m.n; { const p=$('#onlinePill'); if(p)p.textContent='online: '+m.n; } break;
    case 'online.list': state.onlineUsers=m.users||[]; if(state.view==='lobby') renderOnlinePanel(); break;
    case 'queue.waiting': setQueueMsg('searching for an opponent…'); break;
    case 'game.start': state.pendingOut=null; renderToasts(); onGameStart(m); break;
    case 'game.state': onGameState(m); break;
    case 'game.over': onGameOver(m); break;
    case 'draw.offered': state.game.drawFrom=m.from; renderGame(); renderDrawPopup(); playSound('offer'); break;
    case 'challenge.incoming': state.incoming[m.token]={from_name:m.from_name,base:m.base,increment:m.increment,category:m.category}; renderToasts(); playSound('start'); break;
    case 'challenge.created': if(state.pendingOut)state.pendingOut.token=m.token; renderToasts(); break;
    case 'challenge.declined': { const n=state.pendingOut&&state.pendingOut.name; state.pendingOut=null; renderToasts(); flashNotice((n||'They')+' declined'); } break;
    case 'challenge.gone': delete state.incoming[m.token]; renderToasts(); break;
    // ---- Phase 7 ----
    case 'opponent.disconnected': showOpponentBanner(m.grace_seconds); break;
    case 'opponent.reconnected': clearOpponentBanner(); break;
    case 'rematch.offered': onRematchOffered(m); break;
    case 'rematch.declined': state.rematch=null; paintRematchArea(); flashNotice('Opponent declined the rematch'); break;
    case 'chat.msg': onChatMsg(m); break;
    case 'games.live': state.liveGames=m.games||[]; if(state.view==='lobby') renderLiveGames(); break;
    case 'pong': break;
    case 'error': handleChallengeError(m); break;
  }
}

// ===== move navigation / review ladder (F1) =====
// Query an element inside the currently visible view (game + history both use #board/#moveList).
function vq(s){ return document.querySelector('.view:not(.hidden) '+s) || document.querySelector(s); }
// Replay a SAN list into per-ply FENs (plies[0]=start) and UCI last-moves.
function buildPlies(sanMoves){
  const plies=[START_FEN], lastMoves=[];
  if(window.ChessLib){ const c=new window.ChessLib.Chess();
    for(const san of (sanMoves||[])){ let mv=null; try{ mv=c.move(san,{strict:false}); }catch(_){ mv=null; }
      if(!mv) break; plies.push(c.fen()); lastMoves.push(mv.from+mv.to+(mv.promotion||'')); } }
  return {plies,lastMoves};

// Auto-run the next queued premove once it's our turn; validate against the new position.
function maybeRunPremove(){
  if(!state.premove.length || state.game.over) return;
  if(state.game.turn!==state.game.color) return;
  const pm=state.premove[0];
  let uci=null;
  try{ const c=new window.ChessLib.Chess(state.game.fen);
    const mv=c.move({from:pm.from,to:pm.to,promotion:pm.promo||'q'});
    if(mv) uci=pm.from+pm.to+(mv.promotion||''); }catch(_){}
  if(uci){ state.premove.shift(); if(state.review.active) reviewLive(); doMove(uci); } // rest of the chain stays queued
  else { state.premove=[]; renderBoard(); } // chain broke (illegal) -> cancel remaining
}
function renderGame(){
  const g=state.game; const spec=state.spectating;
  const flipTop = g.color==='white'?'black':'white';

  const botName = spec ? (g.color==='white'?g.white:g.black) : (state.me?state.me.name:'You');
  const controls = spec
    ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
         <span class="pill warn">Spectating</span>
         <button class="btn" id="stopWatchBtn" style="margin-left:auto">Stop watching</button>
       </div>`
    : `<div style="display:flex;gap:6px">
         <button class="btn" id="resignBtn">Resign</button>
         <button class="btn" id="drawBtn">Offer draw</button>
       </div>
       <div id="drawOffer" class="hidden" style="margin-top:8px">
         <span class="pill warn">draw offered</span>
         <button class="btn" id="drawYes">Accept</button>
         <button class="btn" id="drawNo">Decline</button>
       </div>`;
  $('#view-game').innerHTML=`
   <div style="display:grid;grid-template-columns:auto 280px;gap:16px;align-items:start;justify-content:center">
     <div>
       ${playerCard(topName,'opp',flipTop)}
       <div class="boardWrap" style="margin:8px 0"><div id="board"></div></div>
       ${playerCard(botName,spec?'opp':'you',g.color)}
     </div>
     <div style="display:flex;flex-direction:column;gap:12px">
       <div class="panel" style="min-height:240px;display:flex;flex-direction:column">
         <div class="muted" style="font-size:11px">MOVES</div>
         <div id="moveList" style="flex:1;overflow:auto;font:12px ui-monospace,monospace;margin:6px 0"></div>
         <div class="muted" id="lastMoveLbl" style="font-size:12px;margin-bottom:6px"></div>
         <div id="reviewBar" style="display:flex;gap:4px;align-items:center;margin-bottom:8px">
           <button class="btn" id="rvFirst" style="padding:4px 9px">⏮</button>
           <button class="btn" id="rvPrev" style="padding:4px 9px">◀</button>
           <button class="btn" id="rvNext" style="padding:4px 9px">▶</button>
           <button class="btn" id="rvLast" style="padding:4px 9px">⏭</button>
           <span class="muted" id="rvStatus" style="font-size:11px;margin-left:auto"></span>
         </div>
         ${controls}
       </div>
       ${chatPanelHtml()}
     </div>
   </div>`;
  renderBoard(); renderMoveList(); paintClocks(); renderChat();
  wireReviewBar();
  { const b=$('#board'); if(b) b.oncontextmenu=e=>{ e.preventDefault(); clearPremove(); }; } // right-click cancels a premove
  if(spec){
    $('#stopWatchBtn').onclick=stopWatching;
  } else {
    $('#resignBtn').onclick=()=>state.game.id&&wsSend({type:'resign',game_id:state.game.id});
    $('#drawBtn').onclick=()=>state.game.id&&wsSend({type:'draw.offer',game_id:state.game.id});
    $('#drawYes').onclick=()=>{wsSend({type:'draw.respond',game_id:state.game.id,accept:true});state.game.drawFrom=null;renderGame();};
    $('#drawNo').onclick=()=>{wsSend({type:'draw.respond',game_id:state.game.id,accept:false});state.game.drawFrom=null;renderGame();};
    $('#drawOffer').classList.toggle('hidden', !state.game.drawFrom || state.game.over);
    const dis=state.game.over; ['resignBtn','drawBtn'].forEach(id=>{const b=$('#'+id);if(b)b.disabled=dis;});
  }
  wireChat();
  renderDrawPopup();
}
function stopWatching(){
  wsSend({type:'spectate.leave'});
  state.spectating=false; state.game.over=true; stopClock();
  $('#overlayRoot').innerHTML=''; clearOpponentBanner();
  showView('lobby');
}
function drawPopupRoot(){ let r=$('#drawPopup'); if(!r){ r=el('div'); r.id='drawPopup';
  r.style.cssText='position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:62;width:calc(100% - 28px);max-width:320px'; document.body.appendChild(r);} return r; }
function respondDraw(accept){ if(state.game.id)wsSend({type:'draw.respond',game_id:state.game.id,accept}); state.game.drawFrom=null; renderGame(); }
function renderDrawPopup(){
  const r=drawPopupRoot();
  if(!state.game.drawFrom || state.game.over){ r.innerHTML=''; r.style.display='none'; return; }
  r.style.display='block';
  r.innerHTML=`<div class="panel" style="padding:14px;text-align:center;border:1px solid var(--warn);box-shadow:0 8px 28px #000a">
    <div class="muted" style="font-size:11px;letter-spacing:1px">DRAW OFFER</div>

      <button class="btn primary" id="drawPopYes" style="flex:1">Accept</button>
      <button class="btn" id="drawPopNo" style="flex:1">Decline</button></div></div>`;
  $('#drawPopYes').onclick=()=>respondDraw(true);
  $('#drawPopNo').onclick=()=>respondDraw(false);
}
function capturedFromFen(fen){
  const counts={p:0,n:0,b:0,r:0,q:0,P:0,N:0,B:0,R:0,Q:0};
  for(const ch of (fen||'').split(' ')[0]) if(ch in counts) counts[ch]++;
  const start={p:8,n:2,b:2,r:2,q:1}, val={p:1,n:3,b:3,r:5,q:9};
  const whiteCap={}, blackCap={}; let wPts=0,bPts=0;
  for(const t of ['p','n','b','r','q']){
    whiteCap[t]=Math.max(0,start[t]-counts[t]);            // missing black pieces
    blackCap[t]=Math.max(0,start[t]-counts[t.toUpperCase()]); // missing white pieces
    wPts+=whiteCap[t]*val[t]; bPts+=blackCap[t]*val[t];
  }
  return {whiteCap,blackCap,diff:wPts-bPts};
}
function trayHtml(capMap,color){ let h='';
  for(const t of ['p','n','b','r','q']) for(let i=0;i<capMap[t];i++)
    h+=pieceMarkup(color==='white'?t:t.toUpperCase());
  return h; }
function meRatingChip(){ const cat=state.game.cat;
  const r=state.me&&state.me.ratings&&state.me.ratings[cat]; if(!r) return '';
  return `<span class="ratechip">${r.rating}<span class="ratecat">${cat}</span></span>`; }
function playerCard(name,who,color){
  const cap=capturedFromFen(boardFen());
  const myCap=color==='white'?cap.whiteCap:cap.blackCap;
  const adv=color==='white'?cap.diff:-cap.diff;
  const chip=who==='you'?meRatingChip():'';
  return `<div class="panel pcard">
    ${avatarHTML(who==='you'&&state.me?state.me.avatar:'',name,'lg')}
    <div class="pcard-main">
      <div class="pcard-name"><b>${esc(name||'—')}</b>${chip}</div>
      <div class="cap-tray">${trayHtml(myCap,color)}${adv>0?`<span class="matadv">+${adv}</span>`:''}</div>
    </div>
    <span class="spacer"></span>
    <span class="clock" id="clk-${color}">—</span></div>`;
}
function renderMoveList(){ const box=vq('#moveList'); if(!box)return;
  const mv=state.game.moves;
  // ply currently shown: while reviewing it's review.ply, else the latest. move at array index j -> ply j+1.
  const curPly=state.review.active?state.review.ply:mv.length;
  const cell=j=>{ if(j>=mv.length||mv[j]==null) return '<span class="mv"></span>';
    const ply=j+1, cur=(ply===curPly)?' cur':'';
    const ev=state.reviewEval&&state.reviewEval[j];
    const badge=(ev&&typeof reviewBadge==='function')?reviewBadge(ev):'';
    return `<span class="mv${cur}" data-ply="${ply}">${esc(mv[j])}${badge}</span>`; };
  let html='';
  for(let i=0;i<mv.length;i+=2){
    html+=`<div class="mvrow"><span class="mvno">${i/2+1}.</span>${cell(i)}${cell(i+1)}</div>`; }
  box.innerHTML=html||'<span class="muted">—</span>';
  box.querySelectorAll('[data-ply]').forEach(s=>s.onclick=()=>reviewGoto(+s.dataset.ply));
  const curEl=box.querySelector('.mv.cur'); if(curEl) curEl.scrollIntoView({block:'nearest'}); else box.scrollTop=box.scrollHeight;
  const lm=mv[mv.length-1];
  const lbl=vq('#lastMoveLbl'); if(lbl) lbl.innerHTML = lm?('last: <b>'+esc(lm)+'</b>'):''; }

function chatPanelHtml(ro){
  const spec=ro||state.spectating;
  return `<div class="panel" id="chatPanel" style="display:flex;flex-direction:column;min-height:170px;max-height:260px">
     <div class="muted" style="font-size:11px">CHAT${spec?' · read-only':''}</div>
     <div id="chatList" class="chatlist"></div>
     ${spec?'':`<div style="display:flex;gap:6px;margin-top:6px">
        <input id="chatInput" maxlength="500" placeholder="Say something…" style="flex:1">
        <button class="btn" id="chatSend">Send</button>
       </div>`}
   </div>`;
}
function renderChat(){
  const list=vq('#chatList'); if(!list) return;
  list.innerHTML = state.chat.length ? state.chat.map(c=>
    `<div class="chatrow ${c.mine?'mine':''}">
       ${c.mine?'':`<span class="chatfrom">${esc(c.from_name||'?')}</span>`}
       <span class="chatbubble">${esc(c.text)}</span>
     </div>`).join('') : '<div class="muted" style="font-size:12px">No messages yet</div>';
  list.scrollTop=list.scrollHeight;
}
function wireChat(){
  const inp=$('#chatInput'), btn=$('#chatSend'); if(!inp||!btn) return;
  const send=()=>{ const text=inp.value.trim(); if(!text||!state.game.id) return;
    wsSend({type:'chat.send',game_id:state.game.id,text:text.slice(0,500)}); inp.value=''; };
  btn.onclick=send;
  inp.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); send(); } };
}
function onChatMsg(m){
  const me=state.me&&state.me.uid;
  state.chat.push({from_name:m.from_name,text:m.text,ts:m.ts,mine:m.from===me});
  renderChat();
}
// Replay/history: load a finished game's stored messages. No history view exists yet —
// this helper is wired for the Phase 8 replay view to call.
async function loadGameMessages(gameId){
  try{ const r=await api('/api/games/'+encodeURIComponent(gameId)); if(!r.ok) return [];
    const d=await r.json(); const me=state.me&&state.me.uid;
    return (d.messages||[]).map(x=>({from_name:x.sender_name,text:x.body,ts:x.ts,mine:x.sender_id===me}));
  }catch(_){ return []; }
}

function onRematchOffered(m){
  state.rematch={game_id:m.game_id, from_name:m.from_name};
  // If the game-over overlay is up, surface Accept/Decline inline; otherwise toast it.
  if($('#rematchArea')) paintRematchArea();
  else flashNotice((m.from_name||'Opponent')+' wants a rematch');
}
function paintRematchArea(){
  const a=$('#rematchArea'); if(!a) return;
  if(state.spectating){ a.innerHTML=''; return; }
  const rm=state.rematch;
  if(rm && rm.sent){ a.innerHTML='<button class="btn" disabled style="width:100%">Waiting for opponent…</button>'; return; }
  if(rm && rm.from_name){
    a.innerHTML=`<div class="muted" style="font-size:12px;margin-bottom:6px"><b>${esc(rm.from_name)}</b> wants a rematch</div>
      <div style="display:flex;gap:8px">
        <button class="btn primary" id="rmAccept" style="flex:1">Accept</button>
        <button class="btn" id="rmDecline" style="flex:1">Decline</button></div>`;
    $('#rmAccept').onclick=()=>{ wsSend({type:'rematch.respond',game_id:rm.game_id,accept:true}); state.rematch=null; paintRematchArea(); };
    $('#rmDecline').onclick=()=>{ wsSend({type:'rematch.respond',game_id:rm.game_id,accept:false}); state.rematch=null; paintRematchArea(); };
    return;
  }
  a.innerHTML='<button class="btn primary" id="rmOffer" style="width:100%">Rematch ↻</button>';
  $('#rmOffer').onclick=()=>{ wsSend({type:'rematch.offer',game_id:state.game.id}); state.rematch={game_id:state.game.id,sent:true}; paintRematchArea(); };
}

// ===== clocks =====
let clockTimer=null,lastTick=null;
function startClock(){ stopClock(); lastTick=performance.now();
  clockTimer=setInterval(()=>{ const now=performance.now(),d=now-lastTick;lastTick=now;
    if(state.game.over)return;
    if(state.game.turn==='white')state.game.whiteMs=Math.max(0,state.game.whiteMs-d);
    else state.game.blackMs=Math.max(0,state.game.blackMs-d);
    paintClocks(); },100); paintClocks(); }
function stopClock(){ if(clockTimer){clearInterval(clockTimer);clockTimer=null;} }
let lowWarned={white:false,black:false};
function paintClocks(){ const fmt=ms=>{ms=Math.max(0,ms|0);const s=Math.floor(ms/1000),m=Math.floor(s/60);
    return m+':'+String(s%60).padStart(2,'0');};
  ['white','black'].forEach(c=>{ const e=$('#clk-'+c); if(!e)return;
    const ms=c==='white'?state.game.whiteMs:state.game.blackMs;
    e.textContent=ms==null?'—':fmt(ms);
    e.classList.toggle('active',!state.game.over&&state.game.turn===c);
    e.classList.toggle('low',ms!=null&&ms<10000);
    if(c===state.game.color && ms!=null && ms<10000 && !state.game.over && !lowWarned[c]){ playSound('low'); lowWarned[c]=true; }
    if(ms>=10000) lowWarned[c]=false;
  }); }

const Sound=(()=>{
  let ctx=null, muted=localStorage.getItem('fc_mute')==='1', unlocked=false, silentEl=null;
  const samples={};
  function ensure(){ if(!ctx){ try{ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(_){}} }
  function silentWavUrl(){ const sr=8000,n=sr/2,len=44+n*2,buf=new ArrayBuffer(len),v=new DataView(buf);
    const wr=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
    wr(0,'RIFF');v.setUint32(4,36+n*2,true);wr(8,'WAVE');wr(12,'fmt ');
    v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
    v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
    wr(36,'data');v.setUint32(40,n*2,true);
    return URL.createObjectURL(new Blob([buf],{type:'audio/wav'})); }
  // Mobile audio unlock. iOS keeps a fresh AudioContext suspended and, worse,
  // routes WebAudio through the silent "ambient" session so the hardware mute
  // switch kills every oscillator. Resuming the context handles the suspend;
  // looping a near-silent HTML5 <audio> element flips iOS to the "playback"
  // session so cues are audible even with the ringer off. Runs once per gesture.
  function unlock(){ ensure(); if(ctx&&ctx.state!=='running'){ try{ctx.resume();}catch(_){} }
    if(unlocked)return; unlocked=true;
    if(ctx){ try{ const b=ctx.createBuffer(1,1,22050),s=ctx.createBufferSource(); s.buffer=b; s.connect(ctx.destination); s.start(0); }catch(_){} }
    try{ silentEl=new Audio(silentWavUrl()); silentEl.loop=true; silentEl.volume=0.01; silentEl.setAttribute('playsinline','');
      const p=silentEl.play(); if(p&&p.catch)p.catch(()=>{}); }catch(_){} }
  function tone(freq,dur,type='sine',gain=0.32){ if(muted)return; ensure(); if(!ctx)return;
    if(ctx.state!=='running'){ try{ctx.resume();}catch(_){} }
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=gain;
    o.connect(g);g.connect(ctx.destination);const t=ctx.currentTime;
    o.start(t);g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.stop(t+dur); }
  function sample(key,vol=1){ if(muted)return; const url=(window.SFX||{})[key]; if(!url)return;
    let a=samples[key]; if(!a){ a=new Audio(url); a.preload='auto'; samples[key]=a; }
    a.volume=vol; try{a.currentTime=0;}catch(_){}
    const p=a.play(); if(p&&p.catch)p.catch(()=>{}); }
  const cues={ move:()=>tone(440,0.08,'triangle',0.34),
    capture:()=>{tone(300,0.09,'sawtooth',0.38);setTimeout(()=>tone(200,0.07,'square',0.28),40);},
    castle:()=>{tone(360,0.07,'sine',0.34);setTimeout(()=>tone(480,0.07,'sine',0.34),60);},
    check:()=>sample('boom',1),
    mate:()=>sample('shotgun',1),
    over:()=>{tone(523,0.15,'sine',0.36);setTimeout(()=>tone(392,0.2,'sine',0.36),120);},
    low:()=>tone(880,0.06,'square',0.26),
    offer:()=>{tone(523,0.14,'sine',0.38);setTimeout(()=>tone(659,0.16,'sine',0.38),150);setTimeout(()=>tone(784,0.18,'sine',0.34),320);},
    start:()=>{tone(392,0.1,'sine',0.34);setTimeout(()=>tone(523,0.12,'sine',0.34),90);} };
  return { play(name){ ensure(); cues[name]&&cues[name](); },
    toggle(){ muted=!muted; localStorage.setItem('fc_mute',muted?'1':'0'); return muted; },
    isMuted(){ return muted; }, resume(){ unlock(); } };
})();
function playSound(n){ Sound.play(n); }
function classifyAndSound(prevFen,uci){
  if(!uci){ return; }
  let kind='move';
  if(window.ChessLib&&prevFen){ try{ const c=new window.ChessLib.Chess(prevFen);
    const mv=c.move({from:uci.slice(0,2),to:uci.slice(2,4),promotion:uci.slice(4)||undefined});
    if(mv){ if(typeof c.isCheckmate==='function' && c.isCheckmate()) return; // mate -> let game.over play the mate sound only
      if(mv.flags.includes('k')||mv.flags.includes('q'))kind='castle';
      else if(mv.flags.includes('c')||mv.flags.includes('e'))kind='capture';
      if(c.inCheck())kind='check'; } }catch(_){}
  } else { const before=fenToBoard(prevFen); if(before[uci.slice(2,4)])kind='capture'; }
  playSound(kind);
}
function refreshMuteBtn(){ $('#muteBtn').textContent=Sound.isMuted()?'🔇':'🔊'; }
$('#muteBtn').onclick=()=>{ Sound.toggle(); refreshMuteBtn(); };
['pointerdown','touchend','click','keydown'].forEach(ev=>
  document.addEventListener(ev,()=>Sound.resume(),{passive:true}));
refreshMuteBtn();

// ===== game over =====
function onGameOver(m){
  state.game.over=true; stopClock(); state.game.drawFrom=null; state.premove=[]; renderDrawPopup(); clearOpponentBanner();
  if(state.spectating){
    playSound('over');
    const res=m.result==='1-0'?'White wins':m.result==='0-1'?'Black wins':'Draw';
    $('#overlayRoot').innerHTML=`<div class="ovl"><div class="panel" style="text-align:center;min-width:300px">
      <h2 style="margin:6px 0 2px">${res}</h2>
      <div class="muted">${esc(m.reason||'')}</div>
      <div style="margin-top:16px"><button class="btn primary" id="ovlLobby">Back to lobby</button></div></div></div>`;
    $('#ovlLobby').onclick=()=>{ $('#overlayRoot').innerHTML=''; stopWatching(); };
    renderGame();
    return;
  }
  playSound(m.reason==='checkmate'?'mate':'over');
  let deltaHtml='';
  if(m.ratings && state.game.color){ const r=m.ratings[state.game.color];
    if(r){ state.lastDelta=r.delta;
      const cls=r.delta>0?'ok':r.delta<0?'bad':'muted';
      const sign=r.delta>0?'+'+r.delta:r.delta<0?'−'+Math.abs(r.delta):'±0';
      deltaHtml=`<div class="pill ${cls}" style="font-size:16px;margin-top:8px">${r.after} (${sign})</div>`;
    } }
  const draw=m.result==='1/2-1/2';
  const youWon=(state.game.color==='white'&&m.result==='1-0')||(state.game.color==='black'&&m.result==='0-1');
  const outcome=draw?'draw':(youWon?'win':'loss');
  const title=draw?'Draw':(youWon?'You won':'You lost');
  const yourK=state.game.color==='black'?'p-bK':'p-wK', oppK=state.game.color==='black'?'p-wK':'p-bK';
  const sym=draw?'p-wK':(youWon?yourK:oppK);
  $('#overlayRoot').innerHTML=`<div class="ovl"><div class="panel result ${outcome}" style="text-align:center;min-width:300px">
    <div class="result-glyph"><svg viewBox="0 0 45 45"><use href="#${sym}"/></svg></div>
    <h2 style="margin:6px 0 2px">${title}</h2>
    <div class="muted">vs ${esc(state.game.opp||'opponent')} · ${esc(m.reason)}</div>
    ${deltaHtml}
    <div id="rematchArea" style="margin-top:14px"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap">
      <button class="btn primary" id="ovlNew">New game ▸</button>
      <button class="btn" id="ovlReview">⚡ Review</button>
      <button class="btn" id="ovlLobby">Back to lobby</button>
    </div></div></div>`;
  paintRematchArea();
  $('#ovlReview').onclick=()=>{ $('#overlayRoot').innerHTML=''; if(typeof reviewGame==='function') reviewGame(); };
  $('#ovlNew').onclick=()=>{ $('#overlayRoot').innerHTML=''; showView('lobby');
    const inc=(TIME_CONTROLS.find(t=>t.base===state.game.base)||{}).inc||0;
    wsSend({type:'queue.join',category:state.game.cat,base:state.game.base,increment:inc}); searchUI(true); };
  $('#ovlLobby').onclick=()=>{ $('#overlayRoot').innerHTML=''; showView('lobby'); };
  refreshMe();
  renderGame();
}
async function refreshMe(){ try{ const r=await api('/api/me'); if(r.ok){ const o=await r.json();
  if(state.me){ state.me.ratings=o.ratings; } if(state.view==='lobby')renderLobby(); } }catch(_){} }

// ===== profile dropdown =====
function renderProfileDropdown(){
  if(!state.me) return;
  const r=state.me&&state.me.ratings;
  const card=(k)=>{const x=r&&r[k]?r[k]:null;
    return `<div class="panel" style="padding:8px;text-align:center"><div class="muted" style="font-size:10px">${k.toUpperCase()}</div>
      <div class="me" style="font-size:20px">${x?x.rating:'—'}</div><div class="muted" style="font-size:10px">${x?x.games_played+'g':''}</div></div>`;};
  $('#profileDropdown').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px">
      ${avatarHTML(state.me.avatar,state.me.name,'lg')}
      <b id="nameDisplay">${esc(state.me.name)}</b>
      <button class="btn ghost" id="editNameBtn" style="padding:2px 6px;font-size:12px">edit</button></div>
    <div class="muted" style="font-size:11px">${esc(state.me.email||state.me.uid)}</div>
    <div id="nameEdit" class="hidden" style="display:flex;gap:6px;margin-top:6px">
      <input id="nameInput" style="flex:1" maxlength="30"><button class="btn" id="nameSave">Save</button>
      <button class="btn ghost" id="nameCancel">×</button></div>
    <div class="bad" id="nameMsg" style="font-size:12px;min-height:14px"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0">${card('bullet')}${card('blitz')}${card('rapid')}</div>
    <div class="muted" style="font-size:11px">HISTORY</div>
    <div id="historyList" style="max-height:180px;overflow:auto;font-size:12px">loading…</div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="btn" id="logoutBtn">Logout</button>
      <button class="btn ghost" id="devToggleBtn" style="margin-left:auto">dev tools</button></div>`;
  $('#editNameBtn').onclick=startNameEdit;
  $('#logoutBtn').onclick=logout;
  $('#devToggleBtn').onclick=toggleDevTools;
  loadHistory();
}
function startNameEdit(){ $('#nameEdit').classList.remove('hidden');
  $('#nameInput').value=state.me.name; $('#nameMsg').textContent='';
  $('#nameSave').onclick=saveName; $('#nameCancel').onclick=()=>$('#nameEdit').classList.add('hidden'); }
async function saveName(){
  const v=$('#nameInput').value.trim(); $('#nameMsg').textContent='';
  if(!v){ $('#nameMsg').textContent='name cannot be empty'; return; }
  try{ const r=await api('/api/me',{method:'PATCH',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({display_name:v})});
    if(r.status===409){ $('#nameMsg').textContent='name already taken'; return; }
    if(r.status===400){ $('#nameMsg').textContent='invalid name'; return; }
    if(!r.ok){ $('#nameMsg').textContent='update failed'; return; }
    const o=await r.json(); setIdentity(o); renderProfileDropdown(); $('#profileDropdown').classList.remove('hidden');
  }catch(_){ $('#nameMsg').textContent='update failed'; }
}
async function loadHistory(){ const box=$('#historyList'); if(!box)return;
  try{ const r=await api('/api/games?limit=50'); const g=await r.json();
    if(!g.length){ box.innerHTML='<span class="muted">no games yet</span>'; return; }
    box.innerHTML=g.map(x=>{ const wld=resultFor(x);
      return `<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--line)">
        <span class="${wld==='W'?'ok':wld==='L'?'bad':'muted'}">${wld}</span>
        <span>vs ${esc(x.opponent)}</span><span class="muted">${esc(x.category)}</span>
        <span>${x.rating_before}→${x.rating_after}</span></div>`; }).join('');
  }catch(_){ box.innerHTML='<span class="bad">failed to load</span>'; } }

// ===== history view (F1) =====
function resultLabel(h){ if(!h) return '';
  const r=h.result;
  if(h.spectatorView){ const t=r==='1-0'?'White wins':r==='0-1'?'Black wins':r==='1/2-1/2'?'Draw':'—'; return t+' · '+esc(h.reason||''); }
  if(r==='1/2-1/2') return 'Draw · '+esc(h.reason||'');
  const youWon=(h.color==='white'&&r==='1-0')||(h.color==='black'&&r==='0-1');
  return (youWon?'You won':'You lost')+' · '+esc(h.reason||''); }
// switch the visible view WITHOUT triggering its list re-render (used to drop straight into a replay)
function activateView(name){ state.view=name;
  ['landing','lobby','game','leaderboard','history','admin'].forEach(v=>$('#view-'+v).classList.toggle('hidden',v!==name));
  document.querySelectorAll('.navlink[data-view]').forEach(n=>n.classList.toggle('active',n.dataset.view===name)); }
async function renderHistory(){
  const box=$('#view-history'); if(!box) return;
  box.innerHTML=`<div class="panel" style="max-width:720px;margin:0 auto">
     <div class="muted" style="font-size:11px;margin-bottom:8px">GAME HISTORY</div>
     <div id="histList"><div class="muted">loading…</div></div></div>`;
  try{ const r=await api('/api/games?limit=50'); const g=await r.json();
    const list=$('#histList'); if(!list) return;
    if(!g.length){ list.innerHTML='<div class="muted">no games yet — play one!</div>'; return; }
    list.innerHTML=g.map((x,i)=>{ const wld=resultFor(x); const cls=wld==='W'?'ok':wld==='L'?'bad':'muted';
      return `<div class="histrow" data-i="${i}" style="display:grid;grid-template-columns:22px 1fr auto auto;gap:10px;align-items:center;padding:8px 4px;border-bottom:1px solid var(--line);cursor:pointer">
        <span class="${cls}" style="font-weight:800">${wld}</span>
        <span>vs <b>${esc(x.opponent||'?')}</b></span>
        <span class="muted" style="font-size:12px">${esc(x.category)} · ${esc(x.reason||'')}</span>
        <span class="pill ${cls}">${x.rating_before}→${x.rating_after}</span></div>`; }).join('');
    list.querySelectorAll('.histrow').forEach(elm=>elm.onclick=()=>openGameReview(g[+elm.dataset.i]));
  }catch(_){ const l=$('#histList'); if(l) l.innerHTML='<div class="bad">failed to load</div>'; }
}
async function openGameReview(row, from){
  state.histReturn = from || 'history';
  activateView('history');
  const box=$('#view-history'); if(!box) return;
  box.innerHTML='<div class="panel"><div class="muted">loading game…</div></div>';
  let detail;
  try{ const r=await api('/api/games/'+encodeURIComponent(row.id)); if(!r.ok) throw 0; detail=await r.json(); }
  catch(_){ box.innerHTML='<div class="panel"><div class="bad">could not load that game</div></div>'; return; }
  const gd=detail.game||{}; const me=state.me&&state.me.uid;
  const isParticipant = gd.white_id===me || gd.black_id===me;
  const adminRow = (row.white!==undefined || row.black!==undefined); // opened from admin: explicit names, neutral POV
  const myColor = gd.white_id===me ? 'white' : (gd.black_id===me ? 'black' : 'white');
  let moves=[]; try{ if(window.ChessLib&&gd.pgn){ const c=new window.ChessLib.Chess(); c.loadPgn(gd.pgn,{strict:false}); moves=c.history(); } }catch(_){}
  const {plies,lastMoves}=buildPlies(moves);
  const myName=(state.me&&state.me.name)||'You';
  const whiteName = adminRow ? (row.white||'White') : (myColor==='white'?myName:row.opponent);
  const blackName = adminRow ? (row.black||'Black') : (myColor==='black'?myName:row.opponent);
  state.histGame={id:row.id, color:myColor, result:gd.result, reason:gd.reason, category:row.category, white:whiteName, black:blackName, spectatorView:!isParticipant};
  state.spectating=false; state.premove=[]; state.reviewEval=null;
  state.game={ id:row.id, color:myColor, fen:plies[plies.length-1], turn:'white', startFen:START_FEN,
    whiteMs:null, blackMs:null, opp:(myColor==='white'?blackName:whiteName), cat:row.category, base:0,
    white:whiteName, black:blackName, moves, over:true, drawFrom:null, lastMove:null };
  state.review={active:true, ply:plies.length-1, plies, lastMoves, moves:moves.slice()};
  state.chat=(detail.messages||[]).map(x=>({from_name:x.sender_name,text:x.body,ts:x.ts,mine:x.sender_id===me}));
  renderHistoryDetail();
}
function renderHistoryDetail(){
  const g=state.game; const flipTop=g.color==='white'?'black':'white';
  const spec=state.histGame&&state.histGame.spectatorView; // admin/non-participant: don't show "you"
  const topName=g.color==='white'?g.black:g.white, botName=g.color==='white'?g.white:g.black;
  const backLabel = state.histReturn==='admin' ? '← Admin' : '← History';
  $('#view-history').innerHTML=`
   <div style="display:grid;grid-template-columns:auto 280px;gap:16px;align-items:start;justify-content:center">
     <div>
       ${playerCard(topName,'opp',flipTop)}
       <div class="boardWrap" style="margin:8px 0"><div id="board"></div></div>

     <div style="display:flex;flex-direction:column;gap:12px">
       <div class="panel" style="min-height:240px;display:flex;flex-direction:column">
         <div style="display:flex;justify-content:space-between;align-items:center">
           <span class="muted" style="font-size:11px">MOVES</span>
           <button class="btn ghost" id="histBack" style="padding:2px 8px;font-size:12px">${backLabel}</button>
         </div>
         <div class="me" style="font-size:13px;margin:4px 0">${resultLabel(state.histGame)}</div>
         <div id="moveList" style="flex:1;overflow:auto;font:12px ui-monospace,monospace;margin:6px 0"></div>
         <div class="muted" id="lastMoveLbl" style="font-size:12px;margin-bottom:6px"></div>
         <div id="reviewBar" style="display:flex;gap:4px;align-items:center;margin-bottom:8px">
           <button class="btn" id="rvFirst" style="padding:4px 9px">⏮</button>
           <button class="btn" id="rvPrev" style="padding:4px 9px">◀</button>
           <button class="btn" id="rvNext" style="padding:4px 9px">▶</button>
           <button class="btn" id="rvLast" style="padding:4px 9px">⏭</button>
           <span class="muted" id="rvStatus" style="font-size:11px;margin-left:auto"></span>
         </div>

   </div>`;
  renderBoard(); renderMoveList(); renderChat(); wireReviewBar();
  $('#histBack').onclick=()=>{ state.review={active:false,ply:0,plies:[],moves:[],lastMoves:[]}; state.histGame=null; state.reviewEval=null; showView(state.histReturn||'history'); };

// ===== admin dashboard (F4) =====
function renderAdmin(){
  const box=$('#view-admin'); if(!box) return;
  if(!state.me||!state.me.is_admin){ box.innerHTML='<div class="panel" style="max-width:420px;margin:6vh auto"><div class="bad">Not authorized.</div></div>'; return; }
  if(!state.adminTab) state.adminTab='users';
  box.innerHTML=`<div class="panel" style="max-width:960px;margin:0 auto">
     <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
       <button class="btn ${state.adminTab==='users'?'primary':''}" data-atab="users">Users &amp; ratings</button>
       <button class="btn ${state.adminTab==='games'?'primary':''}" data-atab="games">Games &amp; chat</button>
       <span class="pill warn" style="margin-left:auto">admin · reversible</span>
     </div>
     <div id="adminBody"><div class="muted">loading…</div></div>
   </div>`;
  document.querySelectorAll('[data-atab]').forEach(b=>b.onclick=()=>{ state.adminTab=b.dataset.atab; renderAdmin(); });
  if(state.adminTab==='users') adminLoadUsers(); else adminLoadGames();
}
function adminFlash(b,ok){ b.textContent=ok?'✓':'✕'; setTimeout(()=>{b.textContent='✓';},1200); }
async function adminLoadUsers(){
  const box=$('#adminBody'); if(!box) return;
  try{ const r=await api('/api/admin/users'); if(!r.ok) throw 0; const users=await r.json();
    const cell=(u,cat)=>{ const rr=(u.ratings&&u.ratings[cat])||{rating:0,games_played:0};
      return `<td><div style="display:flex;gap:3px;align-items:center">
        <input data-uid="${esc(u.id)}" data-cat="${cat}" data-fld="rating" value="${rr.rating}" style="width:54px;padding:3px 5px">
        <input data-uid="${esc(u.id)}" data-cat="${cat}" data-fld="games" value="${rr.games_played}" title="games played" style="width:42px;padding:3px 5px;opacity:.65">
        <button class="btn" data-saver="${esc(u.id)}|${cat}" style="padding:2px 7px">✓</button></div></td>`; };
    box.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr class="muted" style="text-align:left;font-size:11px"><th>Player</th><th>Email</th><th>Bullet</th><th>Blitz</th><th>Rapid</th></tr></thead>
      <tbody>${users.map(u=>`<tr style="border-bottom:1px solid var(--line)">
        <td><div style="display:flex;gap:4px"><input data-namefor="${esc(u.id)}" value="${esc(u.display_name)}" style="width:118px;padding:3px 6px"><button class="btn" data-savename="${esc(u.id)}" style="padding:2px 7px">✓</button></div></td>
        <td class="muted" style="font-size:11px">${esc(u.email)}</td>${cell(u,'bullet')}${cell(u,'blitz')}${cell(u,'rapid')}</tr>`).join('')}</tbody></table>`;
    box.querySelectorAll('[data-savename]').forEach(b=>b.onclick=async()=>{
      const id=b.dataset.savename, name=box.querySelector('[data-namefor="'+CSS.escape(id)+'"]').value.trim(); b.textContent='…';
      const r=await api('/api/admin/users/'+encodeURIComponent(id),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({display_name:name})});
      adminFlash(b,r.ok); flashNotice(r.ok?'name updated':(r.status===409?'name taken':'update failed')); });
    box.querySelectorAll('[data-saver]').forEach(b=>b.onclick=async()=>{
      const [id,cat]=b.dataset.saver.split('|');
      const rt=box.querySelector('input[data-uid="'+CSS.escape(id)+'"][data-cat="'+cat+'"][data-fld="rating"]').value;
      const gp=box.querySelector('input[data-uid="'+CSS.escape(id)+'"][data-cat="'+cat+'"][data-fld="games"]').value; b.textContent='…';
      const r=await api('/api/admin/users/'+encodeURIComponent(id)+'/ratings/'+cat,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({rating:+rt||0,games_played:+gp||0})});
      adminFlash(b,r.ok); flashNotice(r.ok?'rating updated':'update failed'); });
  }catch(_){ box.innerHTML='<div class="bad">failed to load users</div>'; }
}
async function adminLoadGames(){
  const box=$('#adminBody'); if(!box) return;
  try{ const r=await api('/api/admin/games?limit=100'); if(!r.ok) throw 0; const games=await r.json();
    box.innerHTML = games.length?`<table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr class="muted" style="text-align:left;font-size:11px"><th>White</th><th>Black</th><th>Cat</th><th>Result</th><th>Status</th><th></th></tr></thead>
      <tbody>${games.map(g=>`<tr style="border-bottom:1px solid var(--line);${g.voided?'opacity:.5':''}">
        <td>${esc(g.white||'?')}</td><td>${esc(g.black||'?')}</td><td class="muted">${esc(g.category||'')}</td>
        <td>${esc(g.result||'·')} ${g.voided?'<span class="pill warn">void</span>':''}</td>
        <td class="muted" style="font-size:11px">${esc(g.status||'')}</td>
        <td style="white-space:nowrap;text-align:right">
          <button class="btn" data-open="${esc(g.id)}" style="padding:2px 8px">Open</button>
          <button class="btn" data-void="${esc(g.id)}" data-on="${g.voided?1:0}" style="padding:2px 8px">${g.voided?'Un-void':'Void'}</button>
          <button class="btn ghost" data-msgs="${esc(g.id)}" style="padding:2px 8px">Chat</button></td></tr>
        <tr id="msgs-${esc(g.id)}" style="display:none"><td colspan="6" style="background:#0003"></td></tr>`).join('')}</tbody></table>`
      : '<div class="muted">no games yet</div>';
    box.querySelectorAll('[data-void]').forEach(b=>b.onclick=async()=>{
      const id=b.dataset.void, on=b.dataset.on==='1'; b.textContent='…';
      const r=await api('/api/admin/games/'+encodeURIComponent(id)+'/void',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({voided:!on})});
      if(r.ok){ flashNotice(!on?'game voided · ratings reverted':'game restored'); adminLoadGames(); } else { b.textContent=on?'Un-void':'Void'; flashNotice('failed'); } });
    box.querySelectorAll('[data-msgs]').forEach(b=>b.onclick=()=>adminToggleMsgs(b.dataset.msgs));
    box.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{ const g=games.find(x=>x.id===b.dataset.open); if(g) openGameReview({id:g.id,white:g.white,black:g.black,category:g.category},'admin'); });
  }catch(_){ box.innerHTML='<div class="bad">failed to load games</div>'; }
}
function adminToggleMsgs(id){ const row=document.getElementById('msgs-'+id); if(!row) return;
  if(row.style.display!=='none'){ row.style.display='none'; return; } row.style.display=''; adminFillMsgs(id); }
async function adminFillMsgs(id){
  const row=document.getElementById('msgs-'+id); if(!row) return; const cell=row.firstElementChild;
  cell.innerHTML='<span class="muted" style="font-size:12px">loading…</span>';
  try{ const r=await api('/api/admin/games/'+encodeURIComponent(id)+'/messages'); const msgs=await r.json();
    cell.innerHTML = msgs.length? msgs.map(m=>`<div style="display:flex;gap:8px;align-items:center;padding:3px 6px;${m.hidden?'opacity:.45':''}">
      <b style="font-size:12px">${esc(m.sender_name)}:</b><span style="flex:1">${esc(m.body)}</span>
      <button class="btn" data-hide="${m.id}" data-on="${m.hidden?1:0}" style="padding:1px 7px">${m.hidden?'Unhide':'Hide'}</button></div>`).join('')
      : '<span class="muted" style="font-size:12px;padding:6px">no messages</span>';
    cell.querySelectorAll('[data-hide]').forEach(hb=>hb.onclick=async()=>{ const mid=hb.dataset.hide, on=hb.dataset.on==='1';
      const rr=await api('/api/admin/messages/'+mid+'/hide',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hidden:!on})});
      if(rr.ok) adminFillMsgs(id); else flashNotice('failed'); });
  }catch(_){ cell.innerHTML='<span class="bad">failed to load</span>'; }
}

const devLog=[]; let devOpen=false;
function logEvent(dir,obj){ devLog.unshift({dir,t:Date.now(),s:typeof obj==='string'?obj:JSON.stringify(obj)});
  if(devLog.length>200)devLog.pop(); if(devOpen)renderDevLog(); }

function showReconnectBanner(){ let b=$('#reconnBanner');
  if(!b){ b=el('div'); b.id='reconnBanner'; b.style.cssText='position:fixed;top:0;left:0;right:0;background:var(--warn);color:#1a1a1a;text-align:center;padding:4px;z-index:60;font-weight:600'; document.body.appendChild(b);}

// ===== opponent-disconnect banner (pure UI; clock keeps ticking server-side) =====
let oppBannerTimer=null;
function showOpponentBanner(grace){
  let b=$('#oppBanner');
  if(!b){ b=el('div'); b.id='oppBanner'; b.style.cssText='position:fixed;top:0;left:0;right:0;background:#3a2415;color:var(--accent2);text-align:center;padding:5px;z-index:59;font-weight:600;border-bottom:1px solid var(--warn)'; document.body.appendChild(b);}
  let n=Math.max(0,grace|0);
  const paint=()=>{ b.textContent='Opponent disconnected — '+n+'s to reconnect'; };
  paint(); b.style.display='block';
  clearInterval(oppBannerTimer);
  oppBannerTimer=setInterval(()=>{ n--; if(n<=0){ clearOpponentBanner(); return; } paint(); },1000);
}
function clearOpponentBanner(){ clearInterval(oppBannerTimer); oppBannerTimer=null; const b=$('#oppBanner'); if(b)b.style.display='none'; }

// ===== Dotslash matrix loader control =====
const DL = (()=>{
  const loader=document.getElementById('dlLoader');
  if(!loader) return { done(){} };
  let opened=false, bootReady=false, minReady=false, rafs=[];
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const CH="01./<>{}#$%*+=ABCXYZ アイウエオカキクケコサシスセソタチツabcdef".split("");
  function rain(canvas){
    const ctx=canvas.getContext('2d'); if(!ctx) return;
    canvas.width=canvas.clientWidth; canvas.height=canvas.clientHeight;
    const font=16, cols=Math.ceil(canvas.width/font)+1;
    const drops=Array.from({length:cols},()=>Math.random()*-60);
    function draw(){
      ctx.fillStyle="rgba(5,6,8,0.14)"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.font=font+"px 'JetBrains Mono',monospace";
      for(let i=0;i<cols;i++){ const c=CH[(Math.random()*CH.length)|0], x=i*font, y=drops[i]*font;
        ctx.fillStyle="#c9ffe6"; ctx.fillText(c,x,y);
        ctx.fillStyle="#19ff8a"; ctx.fillText(c,x,y-font);
        if(y>canvas.height && Math.random()>0.97) drops[i]=0; drops[i]+=1; }
      rafs.push(requestAnimationFrame(draw));
    }
    draw();
  }
  if(!reduce) loader.querySelectorAll('.dl-door canvas').forEach(rain);
  function stopRain(){ rafs.forEach(cancelAnimationFrame); rafs=[]; }
  function open(){
    if(opened) return; opened=true;
    loader.classList.add('dl-preopen');
    setTimeout(()=>loader.classList.add('dl-open'), 430);
    setTimeout(()=>{ loader.classList.add('dl-gone'); stopRain(); }, 1380);
  }
  function maybe(){ if(bootReady && minReady) open(); }
  setTimeout(()=>{ minReady=true; maybe(); }, 1900);   // min on-screen so the beat + cut always play
  setTimeout(()=>{ bootReady=true; maybe(); }, 6000);  // hard safety if boot never signals
  return { done(){ bootReady=true; maybe(); } };
})();

boot();
